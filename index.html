<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate realistic fake data for testing and development">
    <meta name="author" content="Agent-Lumi">
    <title>Fake Data Generator | Made by Agent-Lumi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
</head>
<body>
    <div class="theme-toggle" id="themeToggle" title="Toggle dark mode">
        <span class="theme-icon">🌙</span>
    </div>
    
    <!-- Offline Indicator -->
    <div id="offlineIndicator" class="offline-indicator" style="display: none;">
        <span class="offline-icon">📡</span>
        <span class="offline-text">You're offline. App is working in offline mode.</span>
    </div>
    
    <div class="container">
        <header>
            <div class="logo">🎲</div>
            <h1>Fake Data Generator</h1>
            <p class="subtitle">Generate realistic fake data for testing and development</p>
        </header>

        <main>
            <div class="data-types">
                <button class="type-btn active" data-type="person">👤 Person</button>
                <button class="type-btn" data-type="company">🏢 Company</button>
                <button class="type-btn" data-type="address">📍 Address</button>
                <button class="type-btn" data-type="internet">🌐 Internet</button>
                <button class="type-btn" data-type="commerce">🛒 Commerce</button>
                <button class="type-btn" data-type="lorem">📝 Lorem</button>
            </div>

            <div class="options-panel">
                <div class="option-group">
                    <label>Quantity: <span id="quantityValue">5</span></label>
                    <input type="range" id="quantity" min="1" max="50" value="5">
                </div>
                <div class="option-group format-group">
                    <label>Format:</label>
                    <select id="format">
                        <option value="json">JSON</option>
                        <option value="csv">CSV</option>
                        <option value="sql">SQL INSERT</option>
                    </select>
                </div>
            </div>

            <button id="generateBtn" class="btn-primary">🎲 Generate Data</button>

            <div class="output-section">
                <div class="output-header">
                    <span class="output-title">Generated Data</span>
                    <div class="output-actions">
                        <button id="copyBtn" class="btn-icon" title="Copy to clipboard">📋</button>
                        <button id="downloadBtn" class="btn-icon" title="Download file">💾</button>
                        <button id="clearBtn" class="btn-icon" title="Clear">🗑️</button>
                    </div>
                </div>
                <textarea id="output" readonly placeholder="Click 'Generate Data' to create fake data..."></textarea>
                <div class="stats-bar" id="statsBar"></div>
            </div>

            <div class="history-section" id="historySection">
                <h3>📜 Recent Generations</h3>
                <div class="history-list" id="historyList"></div>
            </div>
        </main>

        <footer>
            <p>Made with 💡 by <a href="https://github.com/Agent-Lumi" target="_blank">Agent-Lumi</a> for <a href="https://github.com/shalkith" target="_blank">@shalkith</a></p>
            <p class="footer-links">
                <a href="https://github.com/Agent-Lumi/fake-data-generator" target="_blank">View on GitHub →</a>
            </p>
        </footer>
    </div>

    <div id="toast" class="toast"></div>
    
    <script src="app.js"></script>
    
    <!-- Offline Mode Script -->
    <script>
    // Offline indicator functionality
    (function() {
        const offlineIndicator = document.getElementById('offlineIndicator');
        
        function updateOnlineStatus() {
            if (navigator.onLine) {
                offlineIndicator.style.display = 'none';
                document.body.classList.remove('offline');
            } else {
                offlineIndicator.style.display = 'flex';
                document.body.classList.add('offline');
            }
        }
        
        // Initial check
        updateOnlineStatus();
        
        // Listen for online/offline events
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        
        // Show offline status after a delay if we're offline
        setTimeout(updateOnlineStatus, 500);
    })();
    
    // Register Service Worker for offline support
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js')
                .then(function(registration) {
                    console.log('[SW] Service Worker registered:', registration.scope);
                    
                    // Check for updates
                    registration.addEventListener('updatefound', function() {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', function() {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[SW] New version available');
                                // Optional: Show update notification
                            }
                        });
                    });
                })
                .catch(function(error) {
                    console.error('[SW] Service Worker registration failed:', error);
                });
            
            // Listen for messages from service worker
            navigator.serviceWorker.addEventListener('message', function(event) {
                if (event.data === 'reload') {
                    window.location.reload();
                }
            });
        });
    }
    </script>
</body>
</html>
